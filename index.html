<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A2238">
    <meta name="robots" content="noindex, nofollow">
    <title>Le Roi Soleil – Personnages et Histoire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A2238;
            --text-color: #FDFBF7;
            --dark-text: #2C3550;
            --accent-color: #E2B86A;
            --gold-light: #F4D38B;
            --primary-gradient: linear-gradient(135deg, #5C65CD 0%, #764BA4 100%);
            --card-bg: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, var(--gold-light), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, var(--gold-light), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 160px 120px, #fff, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 300px 80px, var(--gold-light), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 180px, #fff, rgba(0,0,0,0));
            background-size: 350px 250px;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px 40px 15px;
        }

        h1, .modal-title, .char-card-info h3, .fact-title, .lexicon-title {
            font-family: 'Playfair Display', Georgia, serif;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            font-size: 2.2rem;
            font-weight: 600;
            margin: 10px 0 20px 0;
        }

        .welcome-banner {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 25px;
            padding: 0 10px;
            font-style: italic;
        }

        /* --- MENU / CTA TABS --- */
        .tab-menu {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 12px;
            overflow-x: auto; /* Permet le défilement si l'écran est très étroit */
            scrollbar-width: none;
        }
        .tab-menu::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 5px;
            border: none;
            background: transparent;
            color: rgba(253, 251, 247, 0.6);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            background: var(--primary-gradient);
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* --- SVG ICONS --- */
        .svg-icon {
            width: 32px;
            height: 32px;
            fill: var(--accent-color);
        }
        .modal-header-bg .svg-icon {
            width: 48px;
            height: 48px;
            fill: #FFF;
        }

        /* --- LISTE DES PERSONNAGES --- */
        .chars-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 768px) { .chars-grid { grid-template-columns: 1fr 1fr; } }

        .char-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .char-card:active { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.25); border-left: 4px solid #5C65CD; }

        .char-card-icon {
            background: rgba(92, 101, 205, 0.1);
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .char-card-info h3 { margin: 0 0 2px 0; color: #3B4387; font-size: 1.3rem; display: flex; align-items: center; }
        .char-card-info p { margin: 0; font-size: 0.85rem; color: var(--dark-text); opacity: 0.8; font-weight: 500; }
        
        .fictional-star { color: var(--accent-color); font-size: 1.1rem; margin-left: 6px; }
        .fictional-legend { text-align: center; font-size: 0.85rem; color: var(--accent-color); opacity: 0.8; margin-top: 25px; font-style: italic; }

        /* --- ORNEMENTS & CONTENU MODALE --- */
        .ornament-divider { text-align: center; margin: 20px 0; position: relative; }
        .ornament-divider::before { content: ''; position: absolute; top: 50%; left: 15%; width: 30%; height: 1px; background: linear-gradient(to right, transparent, rgba(92, 101, 205, 0.3)); }
        .ornament-divider::after { content: ''; position: absolute; top: 50%; right: 15%; width: 30%; height: 1px; background: linear-gradient(to left, transparent, rgba(92, 101, 205, 0.3)); }
        .ornament-divider span { color: #5C65CD; font-size: 1rem; opacity: 0.5; }

        .modal-quote {
            font-style: italic;
            color: #FFF;
            opacity: 0.9;
            text-align: center;
            margin: 15px auto 0 auto;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            max-width: 90%;
        }

        .intro-text { font-size: 0.95rem; text-align: justify; opacity: 0.9; margin-bottom: 20px; color: var(--dark-text); }
        .section-title { color: #5C65CD; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }
        
        .facts-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .facts-list li { margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: var(--dark-text); opacity: 0.9; }
        .facts-list li svg { width: 16px; height: 16px; flex-shrink: 0; fill: var(--accent-color); margin-top: 3px; }

        .role-box, .heritage-box { border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .role-box { background: var(--primary-gradient); color: #FFF; }
        .heritage-box { background: rgba(92, 101, 205, 0.05); border: 1px solid #5C65CD; color: var(--dark-text); }
        .box-title { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 8px; letter-spacing: 0.5px; opacity: 0.9; }
        .box-content { font-size: 0.9rem; margin: 0; line-height: 1.4; }

        /* --- CARTES FAITS HISTORIQUES --- */
        .facts-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .facts-grid { grid-template-columns: 1fr 1fr; } }
        
        .fact-card { background: var(--card-bg); border-radius: 12px; padding: 20px; color: var(--dark-text); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .fact-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .fact-meta { text-align: right; }
        .fact-dates { background: #6366F1; color: #FFF; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        .fact-category { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .fact-title { font-size: 1.5rem; color: #1A2238; margin: 0 0 10px 0; }
        .fact-desc { font-size: 0.95rem; opacity: 0.8; margin-bottom: 15px; }
        .fact-subtitle { color: #5C65CD; font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px; }
        .fact-impact { font-size: 0.9rem; margin-bottom: 15px; font-weight: 500;}
        .fact-ul { padding-left: 20px; margin: 0 0 15px 0; font-size: 0.9rem; opacity: 0.8; }
        .fact-ul li { margin-bottom: 4px; }

        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: transparent; border: 1px solid #CCC; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: var(--dark-text); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .tag:active { border-color: #5C65CD; color: #5C65CD; background: rgba(92, 101, 205, 0.05); }

        /* --- CARTES LEXIQUE --- */
        .lexicon-grid { display: flex; flex-direction: column; gap: 15px; }
        .lexicon-card { background: var(--card-bg); border-radius: 12px; padding: 18px; color: var(--dark-text); box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-left: 4px solid var(--accent-color); }
        .lexicon-title { color: #3B4387; font-size: 1.3rem; margin: 0 0 8px 0; display: flex; align-items: center; gap: 8px; }
        .lexicon-title svg { width: 20px; height: 20px; fill: var(--accent-color); }
        .lexicon-desc { font-size: 0.95rem; margin: 0; opacity: 0.9; text-align: justify; }

        /* --- POPUP / MODALE --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-card {
            background: var(--card-bg); width: 100%; max-width: 500px;
            max-height: 90vh; border-radius: 16px; overflow-y: auto;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Ergonomie mobile : Plein écran */
        @media (max-width: 600px) {
            .modal-overlay { padding: 0; }
            .modal-card { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; display: flex; flex-direction: column; }
            .modal-body { flex: 1; overflow-y: auto; }
        }

        .modal-header-bg { background: var(--primary-gradient); padding: 35px 20px 25px 20px; text-align: center; color: #FFF; position: relative; }
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2);
            border: none; width: 36px; height: 36px; border-radius: 50%; color: #FFF;
            font-size: 1.4rem; cursor: pointer; display: flex; justify-content: center; align-items: center;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .modal-icon { margin-bottom: 15px; display: flex; justify-content: center; }
        .modal-title { font-size: 2rem; margin: 0 0 5px 0; }
        .modal-subtitle { font-size: 1rem; opacity: 0.9; margin-bottom: 12px; }
        .modal-dates { background: rgba(255,255,255,0.2); padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; display: inline-block; font-weight: bold; }
        .modal-dates.fictif { background: transparent; border: 1px dashed rgba(255, 255, 255, 0.7); color: #FFF; }
        .modal-body { padding: 25px 20px; }

        /* --- BACK TO TOP BUTTON --- */
        .back-to-top {
            position: fixed; bottom: 20px; right: 20px; background: var(--primary-gradient);
            color: white; width: 45px; height: 45px; border-radius: 50%; border: none;
            font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;
            display: none; justify-content: center; align-items: center; z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }
        .back-to-top.visible { display: flex; animation: fadeIn 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Le Roi Soleil</h1>
        
        <div class="welcome-banner">
            En attendant le lever de rideau, découvrez la véritable Histoire de la cour de Versailles...
        </div>

        <!-- TABS MENU -->
        <div class="tab-menu" role="tablist">
            <button class="tab-btn active" role="tab" onclick="switchTab('personnages')">Personnages</button>
            <button class="tab-btn" role="tab" onclick="switchTab('faits')">Histoire</button>
            <button class="tab-btn" role="tab" onclick="switchTab('lexique')">Lexique</button>
        </div>

        <!-- ONGLET 1 : PERSONNAGES -->
        <div id="tab-personnages" class="tab-content active" role="tabpanel">
            <div class="chars-grid" id="chars-container">
                <!-- Généré par JS -->
            </div>
            <div class="fictional-legend">✦ Personnage créé pour la comédie musicale</div>
        </div>

        <!-- ONGLET 2 : FAITS HISTORIQUES -->
        <div id="tab-faits" class="tab-content" role="tabpanel">
            <div class="facts-grid" id="facts-container">
                <!-- Généré par JS -->
            </div>
        </div>

        <!-- ONGLET 3 : LEXIQUE -->
        <div id="tab-lexique" class="tab-content" role="tabpanel">
            <div class="lexicon-grid" id="lexicon-container">
                <!-- Généré par JS -->
            </div>
        </div>
    </div>

    <!-- BOUTON RETOUR EN HAUT -->
    <button class="back-to-top" id="bttBtn" aria-label="Retour en haut" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

    <!-- MODALE PERSONNAGE -->
    <div class="modal-overlay" id="charModal" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()" role="dialog" aria-modal="true">
            <div class="modal-header-bg">
                <button class="modal-close" aria-label="Fermer" onclick="closeModal(event)">✕</button>
                <div class="modal-icon" aria-hidden="true" id="modalIcon"></div>
                <h2 class="modal-title" id="modalTitle">Nom</h2>
                <div class="modal-subtitle" id="modalSubtitle">Sous-titre</div>
                <div class="modal-dates" id="modalDates">Dates</div>
                <div class="modal-quote" id="modalQuote">"Citation"</div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Contenu injecté par JS -->
            </div>
        </div>
    </div>

    <script>
        // --- DICTIONNAIRE DES ICÔNES SVG ---

        // --- DONNÉES DES PERSONNAGES ---

            document.getElementById('modalBody').innerHTML = `
                <div class="intro-text">${char.intro}</div>
                <div class="ornament-divider"><span>♦</span></div>
                <div class="section-title">✨ FAITS MARQUANTS</div>
                <ul class="facts-list">${factsHtml}</ul>
                <div class="role-box">
                    <div class="box-title">${roleTitle}</div>
                    <div class="box-content">${char.role}</div>
                </div>
                <div class="heritage-box">
                    <div class="box-title">${heritageTitle}</div>
                    <div class="box-content">${char.heritage}</div>
                </div>
            `;
            
            document.getElementById('charModal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Empêche scroll
        }

        function closeModal(e) {
            if (e.target.classList.contains('modal-overlay') || e.target.classList.contains('modal-close')) {
                document.getElementById('charModal').classList.remove('active');
                document.body.style.overflow = ''; // Restaure scroll
            }
        }
    </script>
</body>
</html>
